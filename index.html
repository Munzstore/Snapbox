<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapBox Pro - AI Powered Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background: #f0f2f5;
        }
        .logo-font {
            font-family: 'Pacifico', cursive;
        }
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        .template-card {
            aspect-ratio: 2/3;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 4px solid transparent;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .template-card.active {
            border-color: #6366f1;
            transform: scale(0.95);
        }
        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            aspect-ratio: 2/3;
            background: #fff;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #f43f5e 100%);
        }
        .photo-count-btn.active {
            background-color: #6366f1;
            color: white;
            border-color: #6366f1;
        }
        /* AI Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">

    <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-3xl logo-font text-indigo-600">SnapBox Pro ✨</h1>
            <div class="flex gap-2">
                <button id="resetBtn" class="bg-rose-100 text-rose-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-rose-200 transition-all">RESET</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Area Pratinjau -->
        <div class="lg:col-span-5 flex flex-col items-center">
            <div id="canvas-container">
                <canvas id="photoCanvas"></canvas>
            </div>

            <div class="mt-6 w-full max-w-sm space-y-4">
                <!-- AI Feature Box -->
                <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-2xl shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs font-bold text-indigo-600 flex items-center gap-1">
                             ✨ AI MAGIC DECORATOR
                        </span>
                        <div id="aiLoading" class="hidden"><div class="loader"></div></div>
                    </div>
                    <p id="aiSuggestion" class="text-[10px] text-indigo-400 italic mb-3">Pilih foto & template lalu klik tombol di bawah untuk ide dekorasi...</p>
                    <button onclick="askGeminiForDecor()" class="w-full bg-white border border-indigo-200 text-indigo-600 py-2 rounded-xl text-xs font-bold hover:bg-indigo-600 hover:text-white transition-all active:scale-95">
                        ✨ TANYA IDE KE AI
                    </button>
                </div>

                <!-- Pemilih Jumlah Foto Manual -->
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-center text-xs font-bold text-slate-400 mb-2 uppercase tracking-tighter">Jumlah Foto</p>
                    <div class="flex gap-2">
                        <button onclick="setPhotoCount(1)" id="pc-1" class="photo-count-btn flex-1 py-2 rounded-xl border-2 border-slate-100 font-bold text-sm transition-all">1</button>
                        <button onclick="setPhotoCount(2)" id="pc-2" class="photo-count-btn flex-1 py-2 rounded-xl border-2 border-slate-100 font-bold text-sm transition-all">2</button>
                        <button onclick="setPhotoCount(3)" id="pc-3" class="photo-count-btn flex-1 py-2 rounded-xl border-2 border-slate-100 font-bold text-sm transition-all active">3</button>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <label class="flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-xl p-2 cursor-pointer h-20 hover:bg-white transition-all bg-slate-50/50">
                        <input type="file" class="hidden img-input" data-index="0" accept="image/*">
                        <span class="text-[9px] font-bold text-slate-400">SLOT 1</span>
                    </label>
                    <label class="flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-xl p-2 cursor-pointer h-20 hover:bg-white transition-all bg-slate-50/50">
                        <input type="file" class="hidden img-input" data-index="1" accept="image/*">
                        <span class="text-[9px] font-bold text-slate-400">SLOT 2</span>
                    </label>
                    <label class="flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-xl p-2 cursor-pointer h-20 hover:bg-white transition-all bg-slate-50/50">
                        <input type="file" class="hidden img-input" data-index="2" accept="image/*">
                        <span class="text-[9px] font-bold text-slate-400">SLOT 3</span>
                    </label>
                </div>
                
                <button id="downloadBtn" class="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-2xl font-bold transition-all shadow-xl hidden">
                    📥 SIMPAN HASIL (.PNG)
                </button>
            </div>
        </div>

        <!-- Pemilih Template -->
        <div class="lg:col-span-7 bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-800 italic uppercase">Pilih Style</h2>
                </div>
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button onclick="filterTemplates('all')" class="px-4 py-2 rounded-lg text-xs font-bold transition-all" id="btn-all">SEMUA</button>
                    <button onclick="filterTemplates('cute')" class="px-4 py-2 rounded-lg text-xs font-bold transition-all" id="btn-cute">CUTE</button>
                    <button onclick="filterTemplates('cool')" class="px-4 py-2 rounded-lg text-xs font-bold transition-all" id="btn-cool">COOL</button>
                </div>
            </div>

            <div id="templateGrid" class="template-grid custom-scrollbar">
                <!-- Konten JS -->
            </div>
        </div>
    </main>

    <script>
        const apiKey = ""; // Diset otomatis oleh lingkungan
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const templateGrid = document.getElementById('templateGrid');
        const resetBtn = document.getElementById('resetBtn');

        let userImages = [null, null, null];
        let activeTemplate = null;
        let currentPhotoCount = 3;
        let aiCaption = "";

        const decorations = ['🌸', '✨', '⚡', '🔥', '💖', '⭐', '🍀', '🕶️', '🍓', '🦋', '🧸', '🍭', '🎸', '🎮', '🚀', '🌈'];
        const colors = ['#FFB6C1', '#1A1A1A', '#E0BBE4', '#003366', '#95E1D3', '#2D3436', '#FCE38A', '#FF4E50'];

        const templates = [];
        for(let i = 0; i < 40; i++) {
            templates.push({
                id: i + 1,
                type: i % 2 === 0 ? 'cute' : 'cool',
                color: colors[i % colors.length],
                deco: decorations[i % decorations.length],
                pattern: ['dots', 'lines', 'grid', 'waves'][i % 4],
                label: `STYLE #${i + 1}`
            });
        }

        async function callGemini(prompt) {
            let retries = 5;
            let delay = 1000;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "Kamu adalah asisten ahli photobooth. Berikan jawaban singkat (maks 20 kata) dalam bahasa Indonesia yang santai." }] }
                        })
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (err) {
                    retries--;
                    if (retries === 0) throw err;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        async function askGeminiForDecor() {
            if (!activeTemplate) {
                document.getElementById('aiSuggestion').innerText = "Pilih template dulu kak!";
                return;
            }
            
            const loading = document.getElementById('aiLoading');
            const suggestionText = document.getElementById('aiSuggestion');
            
            loading.classList.remove('hidden');
            suggestionText.innerText = "Ssstt... AI lagi mikir...";

            try {
                const prompt = `Saya sedang membuat photobooth dengan background warna ${activeTemplate.color} dan tema dekorasi ${activeTemplate.deco}. Berikan satu baris caption estetik untuk ditulis di foto dan satu saran emoji tambahan yang cocok.`;
                const response = await callGemini(prompt);
                
                aiCaption = response.split('\n')[0]; // Ambil baris pertama
                suggestionText.innerText = response;
                drawCanvas(); // Update canvas dengan caption baru
            } catch (e) {
                suggestionText.innerText = "Aduh, AI-nya lagi capek. Coba lagi ya!";
            } finally {
                loading.classList.add('hidden');
            }
        }

        function init() {
            canvas.width = 800;
            canvas.height = 1200;
            filterTemplates('all');
            setPhotoCount(3);
            drawCanvas();
        }

        function setPhotoCount(count) {
            currentPhotoCount = count;
            document.querySelectorAll('.photo-count-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-indigo-600', 'text-white', 'border-indigo-600');
                btn.classList.add('bg-white', 'text-slate-600', 'border-slate-100');
            });
            const activeBtn = document.getElementById(`pc-${count}`);
            activeBtn.classList.add('active', 'bg-indigo-600', 'text-white', 'border-indigo-600');
            drawCanvas();
        }

        document.querySelectorAll('.img-input').forEach(input => {
            input.addEventListener('change', (e) => {
                const index = parseInt(e.target.dataset.index);
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        userImages[index] = img;
                        downloadBtn.classList.remove('hidden');
                        drawCanvas();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        });

        resetBtn.onclick = () => {
            userImages = [null, null, null];
            aiCaption = "";
            document.getElementById('aiSuggestion').innerText = "Pilih foto & template lalu klik tombol di bawah untuk ide dekorasi...";
            drawCanvas();
        };

        function renderTemplates(data) {
            templateGrid.innerHTML = '';
            data.forEach(t => {
                const div = document.createElement('div');
                div.className = `template-card ${activeTemplate?.id === t.id ? 'active' : ''}`;
                div.style.backgroundColor = t.color;
                div.innerHTML = `
                    <div class="absolute inset-0 flex items-center justify-center text-4xl opacity-30">${t.deco}</div>
                    <div class="absolute inset-x-0 bottom-0 p-2 bg-black/40 backdrop-blur-md text-center">
                        <span class="text-[9px] text-white font-extrabold italic uppercase">${t.label}</span>
                    </div>
                `;
                div.onclick = () => {
                    activeTemplate = t;
                    renderTemplates(data);
                    drawCanvas();
                };
                templateGrid.appendChild(div);
            });
        }

        function filterTemplates(type) {
            const filtered = type === 'all' ? templates : templates.filter(t => t.type === type);
            renderTemplates(filtered);
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (activeTemplate) {
                ctx.fillStyle = activeTemplate.color;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawPattern(activeTemplate.pattern);
            }

            const hasPhoto = userImages.some(img => img !== null);
            if (hasPhoto) {
                if (currentPhotoCount === 3) {
                    drawPhoto(userImages[0] || userImages[1] || userImages[2], 80, 100, 480, 340, -0.1);
                    drawPhoto(userImages[1] || userImages[0] || userImages[2], 240, 440, 480, 340, 0.08);
                    drawPhoto(userImages[2] || userImages[1] || userImages[0], 100, 780, 480, 340, -0.05);
                } else if (currentPhotoCount === 2) {
                    drawPhoto(userImages[0] || userImages[1], 100, 180, 550, 400, -0.06);
                    drawPhoto(userImages[1] || userImages[0], 150, 650, 550, 400, 0.06);
                } else {
                    drawPhoto(userImages[0] || userImages[1] || userImages[2], 75, 200, 650, 800, 0.02);
                }
                drawDecorations(activeTemplate);
            } else {
                ctx.fillStyle = '#cbd5e1';
                ctx.font = 'bold 30px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('UPLOAD FOTO KAMU!', canvas.width/2, canvas.height/2);
            }

            // Draw AI Caption
            if (aiCaption) {
                ctx.save();
                ctx.fillStyle = isDark(activeTemplate?.color) ? 'white' : 'black';
                ctx.font = 'italic bold 24px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(aiCaption, canvas.width/2, canvas.height - 120);
                ctx.restore();
            }

            // Watermark
            ctx.save();
            ctx.fillStyle = isDark(activeTemplate?.color) ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.4)';
            ctx.font = 'bold 28px Pacifico';
            ctx.textAlign = 'center';
            ctx.fillText('SnapBox Studio ✨', canvas.width/2, canvas.height - 60);
            ctx.restore();
        }

        function drawPattern(type) {
            ctx.save();
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 2;
            if(type === 'dots') {
                for(let i=0; i<canvas.width; i+=60) for(let j=0; j<canvas.height; j+=60) {
                    ctx.beginPath(); ctx.arc(i, j, 4, 0, Math.PI*2); ctx.stroke();
                }
            } else if(type === 'grid') {
                for(let i=0; i<canvas.width; i+=80) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
                }
            }
            ctx.restore();
        }

        function drawDecorations(t) {
            if(!t) return;
            ctx.font = '100px serif';
            const pos = [[100, 100], [700, 200], [400, 600], [150, 1000], [650, 1100]];
            pos.forEach((p, index) => {
                ctx.save();
                ctx.translate(p[0], p[1]);
                ctx.rotate(index);
                ctx.globalAlpha = 0.5;
                ctx.fillText(t.deco, 0, 0);
                ctx.restore();
            });
        }

        function drawPhoto(img, x, y, w, h, angle = 0) {
            if(!img) return;
            ctx.save();
            ctx.translate(x + w/2, y + h/2);
            ctx.rotate(angle);
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 30;
            ctx.fillStyle = 'white';
            ctx.fillRect(-w/2 - 15, -h/2 - 15, w + 30, h + 30);
            
            ctx.save();
            ctx.beginPath(); ctx.rect(-w/2, -h/2, w, h); ctx.clip();
            const ratio = img.width / img.height;
            const tRatio = w / h;
            let dW, dH, dX, dY;
            if (ratio > tRatio) { dW = h * ratio; dH = h; dX = -dW/2; dY = -h/2; }
            else { dW = w; dH = w / ratio; dX = -w/2; dY = -dH/2; }
            ctx.drawImage(img, dX, dY, dW, dH);
            ctx.restore();
            ctx.restore();
        }

        function isDark(color) {
            if(!color) return false;
            const hex = color.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            return (r * 299 + g * 587 + b * 114) / 1000 < 128;
        }

        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `snapbox-ai.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        };

        window.onload = init;
    </script>
</body>
</html>
